<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0B"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F1F1F" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Top bar: wordmark + meta -->
  <text x="80" y="100" font-family="Space Grotesk, system-ui, sans-serif" font-weight="500" font-size="36" letter-spacing="-0.72" fill="#F5F5F4">subagent</text>
  <text x="242" y="100" font-family="Space Grotesk, system-ui, sans-serif" font-weight="500" font-size="36" fill="#10B981">/</text>
  <text x="260" y="100" font-family="Space Grotesk, system-ui, sans-serif" font-weight="500" font-size="36" letter-spacing="-0.72" fill="#F5F5F4">gtm</text>

  <text x="1120" y="100" text-anchor="end" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="14" letter-spacing="1.4" fill="#737373">SUBAGENTGTM.COM</text>

  <!-- Divider -->
  <line x1="80" y1="140" x2="1120" y2="140" stroke="#1F1F1F" stroke-width="1"/>

  <!-- Hero -->
  <text x="80" y="310" font-family="Space Grotesk, system-ui, sans-serif" font-weight="500" font-size="72" letter-spacing="-2.16" fill="#F5F5F4">GTM engineering</text>
  <text x="80" y="400" font-family="Space Grotesk, system-ui, sans-serif" font-weight="500" font-size="72" letter-spacing="-2.16" fill="#F5F5F4">for teams building on</text>
  <text x="80" y="490" font-family="Fraunces, Georgia, serif" font-weight="400" font-style="italic" font-size="72" letter-spacing="-2.16" fill="#10B981">Claude Code.</text>

  <!-- Footer meta -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1F1F1F" stroke-width="1"/>
  <text x="80" y="580" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="13" letter-spacing="1.3" fill="#737373">SUBAGENTS · FOR · THE · GTM · STACK</text>
  <text x="1120" y="580" text-anchor="end" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="13" letter-spacing="1.3" fill="#10B981">→ BOOK A CALL</text>
</svg>
