name = "subagent-newsletter-signup"
main = "subscribe.js"
compatibility_date = "2024-01-01"

# D1 database for subscribers.
# Create with:
#   npx wrangler d1 create subagent-newsletter
# then paste the printed `database_id` below.
[[d1_databases]]
binding = "DB"
database_name = "subagent-newsletter"
database_id = "REPLACE_WITH_DATABASE_ID"
